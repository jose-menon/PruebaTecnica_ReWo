services:
  - type: web
    name: biblioteca-publica-api
    runtime: java
    rootDir: BibliotecaPublica_TT
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/BibliotecaPublica_TT-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
